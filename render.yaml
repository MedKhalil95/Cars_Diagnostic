services:
  - type: web
    name: autodiag
    runtime: python
    region: frankfurt
    plan: free

    # ── Build ────────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements.txt

    # ── Start ────────────────────────────────────────────────────────────────
    # --preload   : loads the Flask app (and model) BEFORE forking workers
    #               so the port opens fast and Render doesn't time out
    # --workers 1 : free tier has 512 MB RAM; 2 workers would OOM with torch
    # --timeout 120: gives the cold-start model load enough time
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120 --preload --bind 0.0.0.0:$PORT

    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"