services:
  - type: web
    name: autodiag
    runtime: python
    region: frankfurt          # change to: oregon | ohio | singapore | frankfurt
    plan: free                 # upgrade to starter/standard for always-on

    # ── Build ────────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements.txt

    # ── Start ────────────────────────────────────────────────────────────────
    # gunicorn with 2 workers; 1 thread each is fine for CPU inference
    startCommand: gunicorn app:app --workers 2 --threads 1 --timeout 120 --bind 0.0.0.0:$PORT

    # ── Health check ─────────────────────────────────────────────────────────
    healthCheckPath: /

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"